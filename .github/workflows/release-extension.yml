# Build extension and attach zip to release with a fixed name so
# https://github.com/evefrontier/evevault/releases/latest/download/eve-vault-chrome.zip
# always points to the latest build (e.g. for GitBook or docs).
name: Release extension

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      EXTENSION_ZIP: eve-vault-chrome.zip
      CHECKSUMS_FILE: checksums.txt
      ATTESTATION_FILE: eve-vault-chrome.attestation.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension
        run: bun run build:ext

      - name: Zip extension
        run: bun run zip
        working-directory: apps/extension

      - name: Copy zip to fixed name
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(apps/extension/.output/*-chrome.zip)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "Error: No Chrome ZIP found matching 'apps/extension/.output/*-chrome.zip'."
            exit 1
          fi

          if [ "${#files[@]}" -gt 1 ]; then
            echo "Error: Multiple Chrome ZIPs found matching 'apps/extension/.output/*-chrome.zip':"
            printf '  %s\n' "${files[@]}"
            exit 1
          fi

          cp "${files[0]}" "./${EXTENSION_ZIP}"

      - name: Generate checksums
        run: sha256sum "${EXTENSION_ZIP}" > "${CHECKSUMS_FILE}"

      - name: Generate artifact attestation
        id: attest
        uses: actions/attest@v4
        with:
          subject-checksums: ${{ env.CHECKSUMS_FILE }}

      - name: Copy attestation to fixed name
        run: cp "${{ steps.attest.outputs.bundle-path }}" "${ATTESTATION_FILE}"

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${EXTENSION_ZIP}" \
            "${CHECKSUMS_FILE}" \
            "${ATTESTATION_FILE}" \
            --clobber

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: eve-vault-chrome
          path: |
            ${{ env.EXTENSION_ZIP }}
            ${{ env.CHECKSUMS_FILE }}
            ${{ env.ATTESTATION_FILE }}
