# Build extension and attach zip to release with a fixed name so
# https://github.com/evefrontier/evevault/releases/latest/download/eve-vault-chrome.zip
# always points to the latest build (e.g. for GitBook or docs).
name: Release extension

on:
  release:
    types: [published]
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  EXTENSION_ZIP: eve-vault-chrome.zip
  CHECKSUMS_FILE: checksums.txt
  ATTESTATION_FILE: eve-vault-chrome.attestation.json

jobs:
  build-extension:
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check required secrets are present
        shell: bash
        env:
          VITE_TENANT_STILLNESS_CLIENT_SECRET: ${{ secrets.VITE_TENANT_STILLNESS_CLIENT_SECRET }}
          VITE_TENANT_UTOPIA_CLIENT_SECRET: ${{ secrets.VITE_TENANT_UTOPIA_CLIENT_SECRET }}
          VITE_TENANT_TESTEVENET_CLIENT_SECRET: ${{ secrets.VITE_TENANT_TESTEVENET_CLIENT_SECRET }}
          VITE_TENANT_NEBULA_CLIENT_SECRET: ${{ secrets.VITE_TENANT_NEBULA_CLIENT_SECRET }}
          VITE_FUSIONAUTH_REDIRECT_URI: ${{ secrets.VITE_FUSIONAUTH_REDIRECT_URI }}
          VITE_ENOKI_API_KEY: ${{ secrets.VITE_ENOKI_API_KEY }}
          EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
        run: |
          set -euo pipefail
          for name in \
            VITE_TENANT_STILLNESS_CLIENT_SECRET \
            VITE_TENANT_UTOPIA_CLIENT_SECRET \
            VITE_TENANT_TESTEVENET_CLIENT_SECRET \
            VITE_TENANT_NEBULA_CLIENT_SECRET \
            VITE_FUSIONAUTH_REDIRECT_URI \
            VITE_ENOKI_API_KEY \
            EXTENSION_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing"
              exit 1
            fi
            echo "$name is set"
          done

      - name: Build extension
        env:
          VITE_TENANT_STILLNESS_CLIENT_SECRET: ${{ secrets.VITE_TENANT_STILLNESS_CLIENT_SECRET }}
          VITE_TENANT_UTOPIA_CLIENT_SECRET: ${{ secrets.VITE_TENANT_UTOPIA_CLIENT_SECRET }}
          VITE_TENANT_TESTEVENET_CLIENT_SECRET: ${{ secrets.VITE_TENANT_TESTEVENET_CLIENT_SECRET }}
          VITE_TENANT_NEBULA_CLIENT_SECRET: ${{ secrets.VITE_TENANT_NEBULA_CLIENT_SECRET }}
          VITE_FUSIONAUTH_REDIRECT_URI: ${{ secrets.VITE_FUSIONAUTH_REDIRECT_URI }}
          EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
          VITE_ENOKI_API_KEY: ${{ secrets.VITE_ENOKI_API_KEY }}
        run: bun run build:ext

      - name: Zip extension
        run: bun run zip
        working-directory: apps/extension

      - name: Copy zip to fixed name
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(apps/extension/.output/*-chrome.zip)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "Error: No Chrome ZIP found matching 'apps/extension/.output/*-chrome.zip'."
            exit 1
          fi

          if [ "${#files[@]}" -gt 1 ]; then
            echo "Error: Multiple Chrome ZIPs found matching 'apps/extension/.output/*-chrome.zip':"
            printf '  %s\n' "${files[@]}"
            exit 1
          fi

          cp "${files[0]}" "./${EXTENSION_ZIP}"

      - name: Generate checksums
        run: sha256sum "${EXTENSION_ZIP}" > "${CHECKSUMS_FILE}"

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: release-extension-build-assets
          path: |
            ${{ env.EXTENSION_ZIP }}
            ${{ env.CHECKSUMS_FILE }}

  attest-extension:
    runs-on: ubuntu-latest
    needs: build-extension
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          name: release-extension-build-assets
          path: .

      - name: Generate artifact attestation
        id: attest
        uses: actions/attest@e4564b77a2c8b3f4eb9bacf4ba83e6e420d3d11e
        with:
          subject-path: ${{ env.EXTENSION_ZIP }}

      - name: Copy attestation to fixed name
        run: cp "${{ steps.attest.outputs.bundle-path }}" "${ATTESTATION_FILE}"

      - name: Upload attestation asset
        uses: actions/upload-artifact@v4
        with:
          name: release-extension-attestation
          path: ${{ env.ATTESTATION_FILE }}

  publish-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs:
      - build-extension
      - attest-extension
    permissions:
      contents: write
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          name: release-extension-build-assets
          path: .

      - name: Download attestation asset
        uses: actions/download-artifact@v4
        with:
          name: release-extension-attestation
          path: .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${EXTENSION_ZIP}" \
            "${CHECKSUMS_FILE}" \
            "${ATTESTATION_FILE}" \
            --clobber

  upload-manual-artifact:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build-extension
      - attest-extension
    permissions: {}
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          name: release-extension-build-assets
          path: .

      - name: Download attestation asset
        uses: actions/download-artifact@v4
        with:
          name: release-extension-attestation
          path: .

      - name: Upload artifact (manual run)
        uses: actions/upload-artifact@v4
        with:
          name: eve-vault-chrome
          path: |
            ${{ env.EXTENSION_ZIP }}
            ${{ env.CHECKSUMS_FILE }}
            ${{ env.ATTESTATION_FILE }}
